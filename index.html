<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Booba game &lt;3</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #ffe4ec, #fff7fa);
      overflow: hidden;
      touch-action: none;
    }

    #gameWrapper {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-direction: column;
      position: relative;
      padding: 12px;
    }

    h1 {
      margin: 14px 0 8px;
      color: #d63384;
      text-align: center;
      font-size: clamp(28px, 5vw, 48px);
    }

    #info {
      color: #7a2c5b;
      margin-bottom: 10px;
      font-size: clamp(16px, 2.8vw, 20px);
      text-align: center;
      padding: 0 14px;
      max-width: 800px;
    }

    canvas {
      border: 4px solid #f5a3c7;
      border-radius: 20px;
      background: #fff0f6;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      width: min(95vw, 900px);
      height: auto;
      max-height: 60vh;
      display: block;
    }

    #controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 72px 72px 72px;
      grid-template-rows: 72px 72px;
      gap: 10px;
      justify-content: center;
      user-select: none;
    }

    .ctrl {
      border: none;
      border-radius: 18px;
      background: #ff8fbc;
      color: white;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 6px 14px rgba(214, 51, 132, 0.18);
      cursor: pointer;
    }

    .ctrl:active,
    .ctrl.pressed {
      transform: scale(0.96);
      background: #e96ba1;
    }

    #upBtn { grid-column: 2; grid-row: 1; }
    #leftBtn { grid-column: 1; grid-row: 2; }
    #downBtn { grid-column: 2; grid-row: 2; }
    #rightBtn { grid-column: 3; grid-row: 2; }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 240, 246, 0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      z-index: 20;
    }

    #overlayBox {
      max-width: 760px;
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 12px 40px rgba(214, 51, 132, 0.18);
      border: 3px solid #f5a3c7;
    }

    #overlayTitle {
      color: #d63384;
      margin-top: 0;
      font-size: clamp(28px, 5vw, 40px);
    }

    #overlayText {
      color: #6b3050;
      font-size: clamp(18px, 3vw, 22px);
      line-height: 1.7;
      white-space: pre-line;
      margin-bottom: 0;
    }

    .overlayBtn {
      margin-top: 22px;
      padding: 12px 22px;
      font-size: 16px;
      border: none;
      border-radius: 999px;
      background: #d63384;
      color: white;
      cursor: pointer;
      margin-left: 6px;
      margin-right: 6px;
    }

    .overlayBtn:hover {
      background: #bf2c74;
    }

    #overlayButtons {
      margin-top: 18px;
    }

    @media (max-width: 700px) {
      .ctrl {
        width: 68px;
        height: 68px;
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div id="gameWrapper">
    <h1>The Booba game &lt;3</h1>
    <div id="info">
      Catch the little heart if you can 💖<br />
      It’s a bit shy... and a bit annoying.
    </div>

    <canvas id="gameCanvas" width="900" height="520"></canvas>

    <div id="controls">
      <button class="ctrl" id="upBtn">↑</button>
      <button class="ctrl" id="leftBtn">←</button>
      <button class="ctrl" id="downBtn">↓</button>
      <button class="ctrl" id="rightBtn">→</button>
    </div>
  </div>

  <div id="overlay">
    <div id="overlayBox">
      <h2 id="overlayTitle">The Booba game &lt;3</h2>
      <p id="overlayText">Tap the button to start the game 💖</p>
      <div id="overlayButtons">
        <button class="overlayBtn" id="mainBtn">Start game 💕</button>
      </div>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const info = document.getElementById("info");

    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const overlayButtons = document.getElementById("overlayButtons");
    const mainBtn = document.getElementById("mainBtn");

    const music = document.getElementById("bgMusic");
    music.volume = 0.45;

    const bearImage = new Image();
    bearImage.src = "bear.png";

    const keys = {
      ArrowUp: false,
      ArrowDown: false,
      ArrowLeft: false,
      ArrowRight: false,
    };

    let gameStarted = false;
    let phase = "chase"; // chase, decision, ended
    let overlayMode = "start";

    const player = {
      x: 110,
      y: 260,
      size: 68,
      speed: 4.2,
      carryingHeart: false,
    };

    const heart = {
      x: 680,
      y: 250,
      size: 18,
      dodgesLeft: 6,
      escapedFlash: 0,
      visible: true,
      respawnTimer: 0,
      nextX: 680,
      nextY: 250,
      bubble: "",
      bubbleTimer: 0,
      bubbleX: 680,
      bubbleY: 250,
    };

    const redBox = {
      x: 220,
      y: 390,
      w: 90,
      h: 90,
      dodgesLeft: 3,
      visible: true,
      respawnTimer: 0,
      nextX: 220,
      nextY: 390,
    };

    const blueBox = {
      x: 590,
      y: 390,
      w: 90,
      h: 90,
    };

    const sparkles = [];

    const bubbleTexts = [
      "nope 💨",
      "hehe 😝",
      "too slow 😌",
      "catch me then 💖",
      "naaaah 😏",
      "almost!! 😆",
      "bye booba 💨",
      "no no no 😜"
    ];

    function beginGame() {
      if (gameStarted) return;
      gameStarted = true;
      overlay.style.display = "none";

      const p = music.play();
      if (p !== undefined) {
        p.catch((err) => console.log("Music could not start:", err));
      }
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function createSparkles(x, y, amount = 16, color = "#ff9ec4") {
      for (let i = 0; i < amount; i++) {
        sparkles.push({
          x,
          y,
          dx: randomRange(-2.5, 2.5),
          dy: randomRange(-2.5, 2.5),
          life: 30,
          size: randomRange(2, 5),
          color,
        });
      }
    }

    function showBubble(text, x = heart.x, y = heart.y) {
      heart.bubble = text;
      heart.bubbleTimer = 95;
      heart.bubbleX = x;
      heart.bubbleY = y;
    }

    function drawPlayer() {
      if (bearImage.complete && bearImage.naturalWidth > 0) {
        ctx.drawImage(
          bearImage,
          player.x - player.size / 2,
          player.y - player.size / 2,
          player.size,
          player.size
        );
      } else {
        ctx.beginPath();
        ctx.arc(player.x, player.y, 24, 0, Math.PI * 2);
        ctx.fillStyle = "#c98b5b";
        ctx.fill();
      }

      if (player.carryingHeart) {
        drawHeart(player.x + 20, player.y + 2, 12);
      }
    }

    function drawHeart(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, size / 4);
      ctx.bezierCurveTo(size / 2, -size / 2, size, size / 3, 0, size);
      ctx.bezierCurveTo(-size, size / 3, -size / 2, -size / 2, 0, size / 4);
      ctx.fillStyle = heart.escapedFlash > 0 ? "#ff5f91" : "#ff2e63";
      ctx.fill();
      ctx.restore();
    }

    function drawSmallDecorHeart(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, size / 4);
      ctx.bezierCurveTo(size / 2, -size / 2, size, size / 3, 0, size);
      ctx.bezierCurveTo(-size, size / 3, -size / 2, -size / 2, 0, size / 4);
      ctx.fillStyle = "#ff7fae";
      ctx.fill();
      ctx.restore();
    }

    function drawBackgroundDecor() {
      for (let i = 0; i < 10; i++) {
        ctx.globalAlpha = 0.12;
        drawSmallDecorHeart(80 + i * 85, 55 + (i % 2) * 18, 10);
      }
      ctx.globalAlpha = 1;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawBubble() {
      if (heart.bubbleTimer <= 0 || !heart.bubble) return;

      const text = heart.bubble;
      ctx.save();
      ctx.font = "bold 18px Arial";
      const paddingX = 14;
      const textWidth = ctx.measureText(text).width;
      const boxWidth = textWidth + paddingX * 2;
      const boxHeight = 36;

      let bubbleX = heart.bubbleX - boxWidth / 2;
      let bubbleY = heart.bubbleY - 58;

      bubbleX = clamp(bubbleX, 8, canvas.width - boxWidth - 8);
      bubbleY = clamp(bubbleY, 8, canvas.height - boxHeight - 8);

      ctx.globalAlpha = Math.min(1, heart.bubbleTimer / 18);
      ctx.fillStyle = "rgba(255,255,255,0.97)";
      roundRect(ctx, bubbleX, bubbleY, boxWidth, boxHeight, 14);
      ctx.fill();

      ctx.fillStyle = "#d63384";
      ctx.fillText(text, bubbleX + paddingX, bubbleY + 24);
      ctx.restore();
    }

    function drawBox(box, color, label) {
      ctx.save();
      ctx.fillStyle = color;
      roundRect(ctx, box.x, box.y, box.w, box.h, 18);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.font = "bold 24px Arial";
      const tw = ctx.measureText(label).width;
      ctx.fillText(label, box.x + box.w / 2 - tw / 2, box.y + box.h / 2 + 8);
      ctx.restore();
    }

    function updatePlayer() {
      if (keys.ArrowUp) player.y -= player.speed;
      if (keys.ArrowDown) player.y += player.speed;
      if (keys.ArrowLeft) player.x -= player.speed;
      if (keys.ArrowRight) player.x += player.speed;

      const half = player.size / 2;
      player.x = clamp(player.x, half, canvas.width - half);
      player.y = clamp(player.y, half, canvas.height - half);
    }

    function chooseFarHeartPosition() {
      let bestX = heart.x;
      let bestY = heart.y;
      let bestScore = -Infinity;

      const minMoveDistance = 110;
      const maxMoveDistance = 300;

      for (let i = 0; i < 30; i++) {
        let candidateX;
        let candidateY = randomRange(90, canvas.height - 50);

        const maybeOppositeSide = Math.random() < 0.55;

        if (maybeOppositeSide) {
          if (player.x < canvas.width / 2) {
            candidateX = randomRange(canvas.width * 0.58, canvas.width - 55);
          } else {
            candidateX = randomRange(55, canvas.width * 0.42);
          }
        } else {
          let angle = Math.random() * Math.PI * 2;
          let distance = randomRange(minMoveDistance, maxMoveDistance);
          candidateX = heart.x + Math.cos(angle) * distance;
          candidateY = heart.y + Math.sin(angle) * distance;
        }

        candidateX = clamp(candidateX, 55, canvas.width - 55);
        candidateY = clamp(candidateY, 90, canvas.height - 50);

        const distFromPlayer = Math.hypot(candidateX - player.x, candidateY - player.y);
        const distFromOldHeart = Math.hypot(candidateX - heart.x, candidateY - heart.y);

        if (distFromOldHeart < minMoveDistance) continue;

        const score = distFromPlayer * 1.5 + distFromOldHeart * 1.2;

        if (score > bestScore) {
          bestScore = score;
          bestX = candidateX;
          bestY = candidateY;
        }
      }

      heart.nextX = bestX;
      heart.nextY = bestY;
    }

    function startHeartEscape() {
      showBubble(randomItem(bubbleTexts));
      chooseFarHeartPosition();
      heart.visible = false;
      heart.respawnTimer = 42;
      heart.dodgesLeft--;
      heart.escapedFlash = 12;
      createSparkles(heart.x, heart.y, 14, "#ffbad3");

      if (heart.dodgesLeft > 3) {
        info.textContent = "Nope 😝💖";
      } else if (heart.dodgesLeft > 0) {
        info.textContent = "Okay okay... almost 😶‍🌫️";
      } else {
        info.textContent = "Fine... now you can catch me 💘";
      }
    }

    function updateHeartRespawn() {
      if (!heart.visible && heart.respawnTimer > 0) {
        heart.respawnTimer--;
        if (heart.respawnTimer <= 0) {
          heart.x = heart.nextX;
          heart.y = heart.nextY;
          heart.visible = true;
          createSparkles(heart.x, heart.y, 10, "#ffd1e3");
        }
      }
    }

    function rectsOverlap(cx, cy, radius, box) {
      const closestX = clamp(cx, box.x, box.x + box.w);
      const closestY = clamp(cy, box.y, box.y + box.h);
      const dx = cx - closestX;
      const dy = cy - closestY;
      return dx * dx + dy * dy < radius * radius;
    }

    function chooseRedBoxPosition() {
      let bestX = redBox.x;
      let bestY = redBox.y;
      let bestScore = -Infinity;

      const minMoveDistance = 85;
      const maxMoveDistance = 180;

      for (let i = 0; i < 25; i++) {
        let angle = Math.random() * Math.PI * 2;
        let distance = randomRange(minMoveDistance, maxMoveDistance);

        let candidateX = redBox.x + Math.cos(angle) * distance;
        let candidateY = redBox.y + Math.sin(angle) * distance;

        candidateX = clamp(candidateX, 30, canvas.width - redBox.w - 30);
        candidateY = clamp(candidateY, 110, canvas.height - redBox.h - 25);

        const distFromPlayer = Math.hypot(candidateX - player.x, candidateY - player.y);
        const distFromOld = Math.hypot(candidateX - redBox.x, candidateY - redBox.y);

        if (distFromOld < minMoveDistance) continue;

        const score = distFromPlayer * 1.2 + distFromOld;
        if (score > bestScore) {
          bestScore = score;
          bestX = candidateX;
          bestY = candidateY;
        }
      }

      redBox.nextX = bestX;
      redBox.nextY = bestY;
    }

    function startRedBoxEscape() {
      chooseRedBoxPosition();
      redBox.visible = false;
      redBox.respawnTimer = 28;
      redBox.dodgesLeft--;
      createSparkles(redBox.x + redBox.w / 2, redBox.y + redBox.h / 2, 12, "#ffc6d8");
      showBubble(randomItem(["nah 😜", "not yet ❤️", "hehe no", "too late 💨"]), redBox.x + redBox.w / 2, redBox.y);
      info.textContent = redBox.dodgesLeft > 0 ? "The red box is being difficult too 😭" : "Okay... it stopped running.";
    }

    function updateRedBoxRespawn() {
      if (!redBox.visible && redBox.respawnTimer > 0) {
        redBox.respawnTimer--;
        if (redBox.respawnTimer <= 0) {
          redBox.x = redBox.nextX;
          redBox.y = redBox.nextY;
          redBox.visible = true;
          createSparkles(redBox.x + redBox.w / 2, redBox.y + redBox.h / 2, 8, "#ffd1e3");
        }
      }
    }

    function openOverlay(title, text, buttons) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlayButtons.innerHTML = "";
      buttons.forEach((b) => {
        const btn = document.createElement("button");
        btn.className = "overlayBtn";
        btn.textContent = b.label;
        btn.addEventListener("click", b.onClick);
        overlayButtons.appendChild(btn);
      });
      overlay.style.display = "flex";
    }

    function openCaughtHeartOverlay() {
      openOverlay(
        "congrats booba 💖",
        "i guess you never fail to catch my heart 💖\n\nif you want to give it back, you can put it in the red box\nif you want to keep it put it in the blue box",
        [
          {
            label: "Continue",
            onClick: () => {
              overlay.style.display = "none";
              phase = "decision";
              player.carryingHeart = true;
              player.x = 110;
              player.y = 260;
              info.textContent = "Now choose what to do with the heart 💖";
            }
          }
        ]
      );
    }

    function openRedEnding() {
      phase = "ended";
      openOverlay(
        "well...",
        "well, i guess i got it back .. i hope you enjoyed the small game anyway :)",
        [
          {
            label: "Play again",
            onClick: () => {
              overlay.style.display = "none";
              resetGame();
            }
          }
        ]
      );
    }

    function openBlueEnding() {
      phase = "ended";
      openOverlay(
        "booba 💙",
        "well, i guess the word BLUE will be enough when you feel ready .. i hope you enjoyed the game 💙",
        [
          {
            label: "Play again",
            onClick: () => {
              overlay.style.display = "none";
              resetGame();
            }
          }
        ]
      );
    }

    function checkChasePhase() {
      if (!heart.visible) return;

      const dx = player.x - heart.x;
      const dy = player.y - heart.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (heart.dodgesLeft > 0 && distance < 105) {
        startHeartEscape();
      }

      const catchRadius = player.size * 0.28 + heart.size * 0.9;
      if (heart.dodgesLeft <= 0 && distance < catchRadius) {
        phase = "caught";
        player.carryingHeart = true;
        createSparkles(heart.x, heart.y, 30, "#ff6fa8");
        openCaughtHeartOverlay();
      }
    }

    function checkDecisionPhase() {
      const playerRadius = player.size * 0.28;

      if (rectsOverlap(player.x, player.y, playerRadius, blueBox)) {
        openBlueEnding();
        return;
      }

      if (redBox.visible && rectsOverlap(player.x, player.y, playerRadius, redBox)) {
        if (redBox.dodgesLeft > 0) {
          startRedBoxEscape();
        } else {
          openRedEnding();
        }
      }
    }

    function updateSparkles() {
      for (let i = sparkles.length - 1; i >= 0; i--) {
        const s = sparkles[i];
        s.x += s.dx;
        s.y += s.dy;
        s.life--;

        if (s.life <= 0) {
          sparkles.splice(i, 1);
        }
      }

      if (heart.escapedFlash > 0) heart.escapedFlash--;
      if (heart.bubbleTimer > 0) heart.bubbleTimer--;
    }

    function drawSparkles() {
      sparkles.forEach((s) => {
        ctx.globalAlpha = s.life / 30;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawHUD() {
      ctx.fillStyle = "#8b3a62";
      ctx.font = "bold 24px Arial";

      if (phase === "chase" || phase === "caught") {
        ctx.fillText("Catch the heart 💕", 24, 36);
        ctx.font = "18px Arial";
        ctx.fillStyle = "#a64d79";
        ctx.fillText("It keeps slipping away...", 24, 66);
      } else if (phase === "decision") {
        ctx.fillText("Choose the red or blue box 💝", 24, 36);
        ctx.font = "18px Arial";
        ctx.fillStyle = "#a64d79";
        ctx.fillText("The heart is in your hands now...", 24, 66);
      }
    }

    function drawDecisionObjects() {
      if (redBox.visible) drawBox(redBox, "#ff4f70", "RED");
      drawBox(blueBox, "#4b7cff", "BLUE");
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackgroundDecor();
      drawHUD();

      if ((phase === "chase" || phase === "caught") && heart.visible) {
        drawHeart(heart.x, heart.y, heart.size);
      }

      if (phase === "decision" || phase === "ended") {
        drawDecisionObjects();
      }

      drawPlayer();
      drawSparkles();
      drawBubble();
    }

    function gameLoop() {
      if (gameStarted && overlay.style.display === "none") {
        updatePlayer();

        if (phase === "chase") {
          checkChasePhase();
          updateHeartRespawn();
        } else if (phase === "decision") {
          checkDecisionPhase();
          updateRedBoxRespawn();
        }

        updateSparkles();
      } else {
        updateSparkles();
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function resetGame() {
      phase = "chase";
      overlayMode = "start";
      gameStarted = false;

      player.x = 110;
      player.y = 260;
      player.carryingHeart = false;

      heart.x = 680;
      heart.y = 250;
      heart.nextX = 680;
      heart.nextY = 250;
      heart.dodgesLeft = 6;
      heart.escapedFlash = 0;
      heart.visible = true;
      heart.respawnTimer = 0;
      heart.bubble = "";
      heart.bubbleTimer = 0;
      heart.bubbleX = heart.x;
      heart.bubbleY = heart.y;

      redBox.x = 220;
      redBox.y = 390;
      redBox.nextX = 220;
      redBox.nextY = 390;
      redBox.dodgesLeft = 3;
      redBox.visible = true;
      redBox.respawnTimer = 0;

      sparkles.length = 0;
      info.innerHTML = "Catch the little heart if you can 💖<br />It’s a bit shy... and a bit annoying.";

      overlayTitle.textContent = "The Booba game <3";
      overlayText.textContent = "Tap the button to start the game 💖";
      overlayButtons.innerHTML = "";
      const btn = document.createElement("button");
      btn.className = "overlayBtn";
      btn.textContent = "Start game 💕";
      btn.addEventListener("click", beginGame);
      overlayButtons.appendChild(btn);

      overlay.style.display = "flex";
    }

    function setKey(key, value) {
      if (key in keys) keys[key] = value;
    }

    window.addEventListener("keydown", (e) => {
      if (!gameStarted || overlay.style.display !== "none") return;
      if (e.key in keys) {
        keys[e.key] = true;
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.key in keys) {
        keys[e.key] = false;
        e.preventDefault();
      }
    });

    function bindControl(buttonId, keyName) {
      const btn = document.getElementById(buttonId);

      const press = (e) => {
        e.preventDefault();
        if (!gameStarted || overlay.style.display !== "none") return;
        setKey(keyName, true);
        btn.classList.add("pressed");
      };

      const release = (e) => {
        e.preventDefault();
        setKey(keyName, false);
        btn.classList.remove("pressed");
      };

      btn.addEventListener("touchstart", press, { passive: false });
      btn.addEventListener("touchend", release, { passive: false });
      btn.addEventListener("touchcancel", release, { passive: false });

      btn.addEventListener("mousedown", press);
      btn.addEventListener("mouseup", release);
      btn.addEventListener("mouseleave", release);
    }

    bindControl("upBtn", "ArrowUp");
    bindControl("leftBtn", "ArrowLeft");
    bindControl("downBtn", "ArrowDown");
    bindControl("rightBtn", "ArrowRight");

    mainBtn.addEventListener("click", beginGame);

    gameLoop();
  </script>
</body>
</html>
