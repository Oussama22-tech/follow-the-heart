<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Booba game &lt;3</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #ffe4ec, #fff7fa);
      overflow: hidden;
      touch-action: none;
    }

    #gameWrapper {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-direction: column;
      position: relative;
      padding: 12px;
    }

    h1 {
      margin: 14px 0 8px;
      color: #d63384;
      text-align: center;
      font-size: clamp(28px, 5vw, 48px);
    }

    #info {
      color: #7a2c5b;
      margin-bottom: 10px;
      font-size: clamp(16px, 2.8vw, 20px);
      text-align: center;
      padding: 0 14px;
      max-width: 800px;
    }

    canvas {
      border: 4px solid #f5a3c7;
      border-radius: 20px;
      background: #fff0f6;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      width: min(95vw, 900px);
      height: auto;
      max-height: 60vh;
      display: block;
    }

    #controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 72px 72px 72px;
      grid-template-rows: 72px 72px;
      gap: 10px;
      justify-content: center;
      user-select: none;
    }

    .ctrl {
      border: none;
      border-radius: 18px;
      background: #ff8fbc;
      color: white;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 6px 14px rgba(214, 51, 132, 0.18);
    }

    .ctrl:active,
    .ctrl.pressed {
      transform: scale(0.96);
      background: #e96ba1;
    }

    #upBtn { grid-column: 2; grid-row: 1; }
    #leftBtn { grid-column: 1; grid-row: 2; }
    #downBtn { grid-column: 2; grid-row: 2; }
    #rightBtn { grid-column: 3; grid-row: 2; }

    #messageOverlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 240, 246, 0.96);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      z-index: 20;
    }

    #messageBox {
      max-width: 700px;
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 12px 40px rgba(214, 51, 132, 0.18);
      border: 3px solid #f5a3c7;
    }

    #messageBox h2 {
      color: #d63384;
      margin-top: 0;
      font-size: clamp(28px, 5vw, 40px);
    }

    #messageBox p {
      color: #6b3050;
      font-size: clamp(18px, 3vw, 22px);
      line-height: 1.7;
      margin-bottom: 0;
      white-space: pre-line;
    }

    #restartBtn {
      margin-top: 22px;
      padding: 12px 22px;
      font-size: 16px;
      border: none;
      border-radius: 999px;
      background: #d63384;
      color: white;
      cursor: pointer;
    }

    #restartBtn:hover {
      background: #bf2c74;
    }

    @media (max-width: 700px) {
      .ctrl {
        width: 68px;
        height: 68px;
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div id="gameWrapper">
    <h1>The Booba game &lt;3</h1>
    <div id="info">
      Catch the little heart if you can 💖<br />
      It’s a bit shy... and a bit annoying.
    </div>

    <canvas id="gameCanvas" width="900" height="520"></canvas>

    <div id="controls">
      <button class="ctrl" id="upBtn">↑</button>
      <button class="ctrl" id="leftBtn">←</button>
      <button class="ctrl" id="downBtn">↓</button>
      <button class="ctrl" id="rightBtn">→</button>
    </div>
  </div>

  <div id="messageOverlay">
    <div id="messageBox">
      <h2>Happy birthday booba 🎂💖</h2>
      <p>
You unlocked your surprise ✨

I made this little game just for you.
I hope your birthday is full of smiles, love, and beautiful moments.
      </p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const info = document.getElementById("info");
    const overlay = document.getElementById("messageOverlay");
    const restartBtn = document.getElementById("restartBtn");

    const bearImage = new Image();
    bearImage.src = "bear.png";

    const keys = {
      ArrowUp: false,
      ArrowDown: false,
      ArrowLeft: false,
      ArrowRight: false,
    };

    const player = {
      x: 110,
      y: 260,
      size: 68,
      speed: 4.2,
    };

    const heart = {
      x: 680,
      y: 250,
      size: 18,
      dodgesLeft: 10,
      escapedFlash: 0,
      visible: true,
      respawnTimer: 0,
      nextX: 680,
      nextY: 250,
      bubble: "",
      bubbleTimer: 0,
    };

    const sparkles = [];
    let gameWon = false;

    const bubbleTexts = [
      "nope 💨",
      "hehe 😝",
      "too slow 😌",
      "catch me then 💖",
      "naaaah 😏",
      "almost!! 😆",
      "bye booba 💨",
      "no no no 😜"
    ];

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function createSparkles(x, y, amount = 16, color = "#ff9ec4") {
      for (let i = 0; i < amount; i++) {
        sparkles.push({
          x,
          y,
          dx: randomRange(-2.5, 2.5),
          dy: randomRange(-2.5, 2.5),
          life: 30,
          size: randomRange(2, 5),
          color,
        });
      }
    }

    function showBubble(text) {
      heart.bubble = text;
      heart.bubbleTimer = 50;
    }

    function drawPlayer() {
      if (bearImage.complete && bearImage.naturalWidth > 0) {
        ctx.drawImage(
          bearImage,
          player.x - player.size / 2,
          player.y - player.size / 2,
          player.size,
          player.size
        );
      } else {
        ctx.beginPath();
        ctx.arc(player.x, player.y, 24, 0, Math.PI * 2);
        ctx.fillStyle = "#c98b5b";
        ctx.fill();
      }
    }

    function drawHeart(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, size / 4);
      ctx.bezierCurveTo(size / 2, -size / 2, size, size / 3, 0, size);
      ctx.bezierCurveTo(-size, size / 3, -size / 2, -size / 2, 0, size / 4);
      ctx.fillStyle = heart.escapedFlash > 0 ? "#ff5f91" : "#ff2e63";
      ctx.fill();
      ctx.restore();
    }

    function drawSmallDecorHeart(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, size / 4);
      ctx.bezierCurveTo(size / 2, -size / 2, size, size / 3, 0, size);
      ctx.bezierCurveTo(-size, size / 3, -size / 2, -size / 2, 0, size / 4);
      ctx.fillStyle = "#ff7fae";
      ctx.fill();
      ctx.restore();
    }

    function drawBackgroundDecor() {
      for (let i = 0; i < 10; i++) {
        ctx.globalAlpha = 0.12;
        drawSmallDecorHeart(80 + i * 85, 55 + (i % 2) * 18, 10);
      }
      ctx.globalAlpha = 1;
    }

    function drawBubble() {
      if (!heart.visible || heart.bubbleTimer <= 0 || !heart.bubble) return;

      const text = heart.bubble;
      ctx.save();
      ctx.font = "bold 18px Arial";
      const paddingX = 14;
      const paddingY = 10;
      const textWidth = ctx.measureText(text).width;
      const boxWidth = textWidth + paddingX * 2;
      const boxHeight = 36;

      let bubbleX = heart.x - boxWidth / 2;
      let bubbleY = heart.y - 58;

      bubbleX = clamp(bubbleX, 8, canvas.width - boxWidth - 8);
      bubbleY = clamp(bubbleY, 8, canvas.height - boxHeight - 8);

      ctx.globalAlpha = Math.min(1, heart.bubbleTimer / 12);
      ctx.fillStyle = "rgba(255,255,255,0.96)";
      roundRect(ctx, bubbleX, bubbleY, boxWidth, boxHeight, 14);
      ctx.fill();

      ctx.fillStyle = "#d63384";
      ctx.fillText(text, bubbleX + paddingX, bubbleY + 24);
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function updatePlayer() {
      if (keys.ArrowUp) player.y -= player.speed;
      if (keys.ArrowDown) player.y += player.speed;
      if (keys.ArrowLeft) player.x -= player.speed;
      if (keys.ArrowRight) player.x += player.speed;

      const half = player.size / 2;
      player.x = clamp(player.x, half, canvas.width - half);
      player.y = clamp(player.y, half, canvas.height - half);
    }

   function chooseFarHeartPosition() {
  let bestX = heart.x;
  let bestY = heart.y;

  const minMoveDistance = 70;   // smaller than before (easier)
  const maxMoveDistance = 220;  // limit how far it can go

  for (let i = 0; i < 20; i++) {
    let angle = Math.random() * Math.PI * 2;
    let distance = randomRange(minMoveDistance, maxMoveDistance);

    let candidateX = heart.x + Math.cos(angle) * distance;
    let candidateY = heart.y + Math.sin(angle) * distance;

    // clamp inside screen
    candidateX = clamp(candidateX, 55, canvas.width - 55);
    candidateY = clamp(candidateY, 90, canvas.height - 50);

    const distFromPlayer = Math.hypot(candidateX - player.x, candidateY - player.y);
    const distFromOldHeart = Math.hypot(candidateX - heart.x, candidateY - heart.y);

    // choose position that is not too close but also not insane
    if (
      distFromOldHeart > minMoveDistance &&
      distFromOldHeart < maxMoveDistance &&
      distFromPlayer > 60
    ) {
      bestX = candidateX;
      bestY = candidateY;
      break;
    }
  }

  heart.nextX = bestX;
  heart.nextY = bestY;
}
    function startHeartEscape() {
      chooseFarHeartPosition();
      heart.visible = false;
      heart.respawnTimer = 42;
      heart.dodgesLeft--;
      heart.escapedFlash = 12;

      createSparkles(heart.x, heart.y, 14, "#ffbad3");
      showBubble(randomItem(bubbleTexts));

      if (heart.dodgesLeft > 6) {
        info.textContent = "Nope 😝💖";
      } else if (heart.dodgesLeft > 3) {
        info.textContent = "Still too slow, booba 😏";
      } else if (heart.dodgesLeft > 0) {
        info.textContent = "Okay okay... almost 😶‍🌫️";
      } else {
        info.textContent = "Fine... now you can catch me 💘";
      }
    }

    function updateHeartRespawn() {
      if (!heart.visible && heart.respawnTimer > 0) {
        heart.respawnTimer--;
        if (heart.respawnTimer <= 0) {
          heart.x = heart.nextX;
          heart.y = heart.nextY;
          heart.visible = true;
          createSparkles(heart.x, heart.y, 10, "#ffd1e3");
        }
      }
    }

    function checkHeartBehavior() {
      if (!heart.visible) return;

      const dx = player.x - heart.x;
      const dy = player.y - heart.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (heart.dodgesLeft > 0 && distance < 105) {
        startHeartEscape();
      }

      const catchRadius = player.size * 0.28 + heart.size * 0.9;
      if (heart.dodgesLeft <= 0 && distance < catchRadius) {
        gameWon = true;
        overlay.style.display = "flex";
        info.textContent = "You got it 💖";
        createSparkles(heart.x, heart.y, 30, "#ff6fa8");
      }
    }

    function updateSparkles() {
      for (let i = sparkles.length - 1; i >= 0; i--) {
        const s = sparkles[i];
        s.x += s.dx;
        s.y += s.dy;
        s.life--;

        if (s.life <= 0) {
          sparkles.splice(i, 1);
        }
      }

      if (heart.escapedFlash > 0) heart.escapedFlash--;
      if (heart.bubbleTimer > 0) heart.bubbleTimer--;
    }

    function drawSparkles() {
      sparkles.forEach((s) => {
        ctx.globalAlpha = s.life / 30;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawHUD() {
      ctx.fillStyle = "#8b3a62";
      ctx.font = "bold 24px Arial";
      ctx.fillText("Catch the heart 💕", 24, 36);

      ctx.font = "18px Arial";
      ctx.fillStyle = "#a64d79";
      ctx.fillText("It keeps slipping away...", 24, 66);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackgroundDecor();
      drawHUD();
      if (heart.visible) drawHeart(heart.x, heart.y, heart.size);
      drawPlayer();
      drawSparkles();
      drawBubble();
    }

    function gameLoop() {
      if (!gameWon) {
        updatePlayer();
        checkHeartBehavior();
        updateHeartRespawn();
        updateSparkles();
      } else {
        updateSparkles();
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function resetGame() {
      gameWon = false;
      player.x = 110;
      player.y = 260;
      heart.x = 680;
      heart.y = 250;
      heart.nextX = 680;
      heart.nextY = 250;
      heart.dodgesLeft = 10;
      heart.escapedFlash = 0;
      heart.visible = true;
      heart.respawnTimer = 0;
      heart.bubble = "";
      heart.bubbleTimer = 0;
      sparkles.length = 0;
      overlay.style.display = "none";
      info.innerHTML = "Catch the little heart if you can 💖<br />It’s a bit shy... and a bit annoying.";
    }

    function setKey(key, value) {
      if (key in keys) keys[key] = value;
    }

    window.addEventListener("keydown", (e) => {
      if (e.key in keys) {
        keys[e.key] = true;
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.key in keys) {
        keys[e.key] = false;
        e.preventDefault();
      }
    });

    function bindControl(buttonId, keyName) {
      const btn = document.getElementById(buttonId);

      const press = (e) => {
        e.preventDefault();
        setKey(keyName, true);
        btn.classList.add("pressed");
      };

      const release = (e) => {
        e.preventDefault();
        setKey(keyName, false);
        btn.classList.remove("pressed");
      };

      btn.addEventListener("touchstart", press, { passive: false });
      btn.addEventListener("touchend", release, { passive: false });
      btn.addEventListener("touchcancel", release, { passive: false });

      btn.addEventListener("mousedown", press);
      btn.addEventListener("mouseup", release);
      btn.addEventListener("mouseleave", release);
    }

    bindControl("upBtn", "ArrowUp");
    bindControl("leftBtn", "ArrowLeft");
    bindControl("downBtn", "ArrowDown");
    bindControl("rightBtn", "ArrowRight");

    restartBtn.addEventListener("click", resetGame);

    gameLoop();
  </script>
</body>
</html>
